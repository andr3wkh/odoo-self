services:
  # ── PostgreSQL 17 ──
  db:
    image: postgres:17
    container_name: odoo-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (session store) ──
  redis:
    image: redis:7-alpine
    container_name: odoo-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Odoo 18 ──
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odoo-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      HOST: ${ODOO_DB_HOST}
      PORT: ${ODOO_DB_PORT}
      USER: ${ODOO_DB_USER}
      PASSWORD: ${ODOO_DB_PASSWORD}
    volumes:
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./addons:/mnt/extra-addons
      - ./enterprise:/mnt/enterprise
      - odoo-data:/var/lib/odoo
    ports:
      - "8069:8069"
      - "8072:8072"

  # ── Nginx (reverse proxy) ──
  nginx:
    image: nginx:alpine
    container_name: odoo-nginx
    restart: unless-stopped
    depends_on:
      - odoo
    volumes:
      - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres-data:
  redis-data:
  odoo-data:
